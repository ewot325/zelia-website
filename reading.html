<script>
(function(){
  var pop=document.getElementById('bookpop');
  if(!pop) return;
  var img=pop.querySelector('img'), t=pop.querySelector('.bp-t'), a=pop.querySelector('.bp-a');
  function fill(el){ t.textContent=el.getAttribute('data-t'); a.textContent=el.getAttribute('data-a'); img.src=el.getAttribute('data-c'); }
  function place(x,y){
    var pad=14, w=pop.offsetWidth, h=pop.offsetHeight;
    var nx=x+20, ny=y-h/2;
    if(nx+w+pad>window.innerWidth) nx=x-w-20;
    if(nx<pad) nx=pad;
    if(ny<pad) ny=pad;
    if(ny+h+pad>window.innerHeight) ny=window.innerHeight-h-pad;
    pop.style.left=nx+'px'; pop.style.top=ny+'px';
  }
  document.querySelectorAll('.shelfart a.book').forEach(function(el){
    el.addEventListener('mouseenter', function(e){ fill(el); place(e.clientX,e.clientY); pop.classList.add('show'); });
    el.addEventListener('mousemove', function(e){ place(e.clientX,e.clientY); });
    el.addEventListener('mouseleave', function(){ pop.classList.remove('show'); });
    el.addEventListener('focus', function(){ fill(el); var r=el.getBoundingClientRect(); place(r.right, r.top+r.height/2); pop.classList.add('show'); });
    el.addEventListener('blur', function(){ pop.classList.remove('show'); });
  });
})();
</script>
