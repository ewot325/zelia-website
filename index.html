  .topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;
    max-width:1000px;margin:0 auto;padding:16px 24px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#6b5d45;}

  .topbar nav a{color:#7a6c52;text-decoration:none;margin-left:16px;}
  .topbar nav a:hover{color:#2c2316;}
  .stage{max-width:1000px;margin:0 auto;padding:6px 12px 50px;}
  .scene{width:100%;height:auto;display:block;}
  .obj{cursor:pointer;}
  .obj .art{transition:transform .2s ease;transform-box:fill-box;transform-origin:center bottom;}
  .obj:hover .art{transform:translateY(-12px);}
  .lbl{opacity:0;transition:opacity .18s ease;font-family:var(--body);font-style:italic;font-size:16px;fill:#3a2f22;text-anchor:middle;}
  .obj:hover .lbl{opacity:1;}
