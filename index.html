<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zelia Lerch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root{ --display:'Fraunces',Georgia,serif; --body:'Newsreader',Georgia,serif; }
  *{box-sizing:border-box;}
  body{margin:0; background:#e9dfca; color:#221f1a; font-family:var(--body);}
  /* slim backup menu — accessibility + people who want a plain way around */
  .topbar{display:flex; justify-content:space-between; align-items:center; gap:18px;
    max-width:1000px; margin:0 auto; padding:16px 24px; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#6b5d45;}
  .topbar .brand{font-family:var(--display); font-size:18px; letter-spacing:.01em; text-transform:none; color:#2c2316;}
  .topbar nav a{color:#7a6c52; text-decoration:none; margin-left:16px;}
  .topbar nav a:hover{color:#2c2316;}
  .stage{max-width:1000px; margin:0 auto; padding:0 12px 60px;}
  .scene{width:100%; height:auto; display:block;}
  /* clickable objects/books: lift on hover */
  .obj{cursor:pointer;}
  .obj .art{transition:transform .2s ease; transform-box:fill-box; transform-origin:center bottom;}
  .obj:hover .art{transform:translateY(-12px);}
  .lbl{opacity:0; transition:opacity .18s ease; font-family:var(--body); font-style:italic; font-size:16px; fill:#3a2f22; text-anchor:middle;}
  .obj:hover .lbl{opacity:1;}
  .note{max-width:1000px; margin:0 auto; padding:8px 24px 0; color:#7a6c52; font-style:italic; font-size:14px;}
</style>
</head>
<body>

  <div class="topbar">
    <a class="brand" href="index.html">Zelia Lerch</a>
    <nav>
      <a href="writing.html">Writing</a>
      <a href="knitting.html">Knitting</a>
      <a href="reading.html">Reading</a>
      <a href="things-i-saw.html">Things I saw</a>
    </nav>
  </div>

  <div class="stage">
  <svg class="scene" viewBox="0 88 1000 932" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="An illustrated bookcase. On top: a framed photo of Zelia, a trophy linking to LinkedIn, a stack of letters for email, and polaroids for Instagram. The shelves below hold a book for each section of the site.">
    <defs>
      <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#f1e8d6"/><stop offset="1" stop-color="#e3d7bf"/>

        <stop offset="0" stop-color="#7d5026"/><stop offset="1" stop-color="#5f3c1b"/>
      </linearGradient>
      <linearGradient id="woodSide" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#6e451f"/><stop offset="1" stop-color="#85572c"/>
      </linearGradient>
      <linearGradient id="back" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#46301a"/><stop offset="1" stop-color="#3a2613"/>
      </linearGradient>
      <linearGradient id="ledge" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#c08a4f"/><stop offset="0.5" stop-color="#9a6536"/><stop offset="1" stop-color="#6e451f"/>

      <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#f6da8b"/><stop offset="0.5" stop-color="#d7ab48"/><stop offset="1" stop-color="#a87f2c"/>
      </linearGradient>
      <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#caa05a"/><stop offset="1" stop-color="#8f6a32"/>
      </linearGradient>
      <radialGradient id="vign" cx="0.5" cy="0.42" r="0.75">
        <stop offset="0.6" stop-color="#000000" stop-opacity="0"/><stop offset="1" stop-color="#000000" stop-opacity="0.16"/>
      </radialGradient>

      <filter id="grain" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.7" numOctaves="3" seed="9" result="t"/>
        <feColorMatrix in="t" type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0 0.04  0 0 0 0.22 0"/>
      </filter>
      <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
