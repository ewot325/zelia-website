name: Deploy to Pages

# Serves the repo's static files directly (no Jekyll). Runs on every push,
# after the daily shelves update, and on demand.
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Update shelves (Letterboxd + Goodreads + Last.fm)"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
