  function fill(el){
    t.textContent=el.getAttribute('data-t');
    var dir=el.getAttribute('data-d')||'', art=el.getAttribute('data-a')||'';
    var sub=dir?('dir. '+dir):art;               // movies show the director, records the artist
    d.textContent=sub; d.style.display=sub?'':'none';
    var stars=el.getAttribute('data-r')||'';
    r.textContent=stars; r.style.display=stars?'':'none';
    var c=el.getAttribute('data-c')||'';
    if(c){ img.src=c; img.style.display=''; } else { img.style.display='none'; }
  }
  function place(x,y){
    var pad=14, w=pop.offsetWidth, h=pop.offsetHeight;
    var nx=x+20, ny=y-h/2;
    if(nx+w+pad>window.innerWidth) nx=x-w-20;
    if(nx<pad) nx=pad;
    if(ny<pad) ny=pad;
    if(ny+h+pad>window.innerHeight) ny=window.innerHeight-h-pad;
    pop.style.left=nx+'px'; pop.style.top=ny+'px';
  }
  document.querySelectorAll('.shelfart a.item[data-t]').forEach(function(el){
    el.addEventListener('mouseenter', function(e){ fill(el); place(e.clientX,e.clientY); pop.classList.add('show'); });
    el.addEventListener('mousemove', function(e){ place(e.clientX,e.clientY); });
    el.addEventListener('mouseleave', function(){ pop.classList.remove('show'); });
    el.addEventListener('focus', function(){ fill(el); var rct=el.getBoundingClientRect(); place(rct.right, rct.top+rct.height/2); pop.classList.add('show'); });
    el.addEventListener('blur', function(){ pop.classList.remove('show'); });
  });
})();
</script>
</body>
</html>
