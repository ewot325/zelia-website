<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview B — Refined illustration</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#f4efe3;font-family:'Newsreader',Georgia,serif;color:#2c2316;}
  .head{max-width:760px;margin:0 auto;padding:22px 24px 6px;}
  .head h1{font-family:'Fraunces',serif;font-size:22px;margin:0 0 2px;}
  .head p{margin:0;color:#8a7c62;font-style:italic;font-size:14px;}
  .stage{max-width:760px;margin:0 auto;padding:8px 16px 40px;}
  svg{width:100%;height:auto;display:block;}
</style>
</head>
<body>
  <div class="head">
    <h1>Option 4 — Refined illustration</h1>
    <p>Elegant, flat, intentional — line &amp; color, generous space, matched to the site's typography. Polished by restraint.</p>
  </div>
  <div class="stage">
  <svg viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
      <clipPath id="pcb"><rect x="266" y="86" width="84" height="110" rx="3"/></clipPath>
    </defs>
    <rect x="0" y="0" width="720" height="540" fill="#f4efe3"/>

    <!-- thin ink linework bookcase -->
    <g fill="none" stroke="#3a2f22" stroke-width="2.2">
      <rect x="64" y="232" width="592" height="288" rx="4"/>
      <line x1="64" y1="376" x2="656" y2="376"/>
    </g>
    <!-- top line (the surface things rest on) -->
    <line x1="48" y1="232" x2="672" y2="232" stroke="#3a2f22" stroke-width="3" stroke-linecap="round"/>

    <!-- framed photo: clean, single soft shadow -->
    <g>
      <rect x="258" y="78" width="100" height="126" rx="3" fill="#fff" stroke="#3a2f22" stroke-width="2.2"/>
      <rect x="266" y="86" width="84" height="110" fill="#e7dcc6"/>
      <image href="photo.jpg" xlink:href="photo.jpg" x="266" y="86" width="84" height="110" preserveAspectRatio="xMidYMid slice" clip-path="url(#pcb)"/>
      <rect x="266" y="86" width="84" height="110" fill="none" stroke="#3a2f22" stroke-width="1.5"/>
    </g>

    <!-- trophy: simple two-tone, line drawn -->
    <g fill="#e9c25e" stroke="#3a2f22" stroke-width="2.2" stroke-linejoin="round">
      <path d="M474 130 h44 v16 a22 22 0 0 1 -44 0 Z"/>
      <path d="M474 134 c-15 0 -15 24 7 28" fill="none"/>
      <path d="M518 134 c15 0 15 24 -7 28" fill="none"/>
      <rect x="490" y="162" width="12" height="16"/>
      <rect x="476" y="178" width="40" height="10" rx="2"/>
    </g>
    <text x="496" y="148" text-anchor="middle" font-family="Fraunces,serif" font-weight="600" font-size="13" fill="#3a2f22">in</text>

    <!-- nameplate as simple centered caps -->
    <text x="360" y="226" text-anchor="middle" font-family="Fraunces,serif" font-weight="600" font-size="11" letter-spacing="3" fill="#8a7c62">ZELIA LERCH</text>

    <!-- books: flat color, clean ink outline, refined serif titles -->
    <g stroke="#3a2f22" stroke-width="2" stroke-linejoin="round">
      <rect x="92" y="300" width="18" height="76" fill="#cdbf9f"/>
      <rect x="110" y="290" width="15" height="86" fill="#b6a98a"/>
      <rect x="150" y="276" width="44" height="100" fill="#c25b73"/>
      <rect x="196" y="290" width="42" height="86" fill="#c0922f"/>
      <rect x="240" y="270" width="48" height="106" fill="#5f9072"/>
      <rect x="290" y="286" width="44" height="90" fill="#5f72a6"/>
      <rect x="360" y="300" width="18" height="76" fill="#cdbf9f"/>
      <rect x="378" y="288" width="20" height="88" fill="#b6a98a"/>
      <rect x="402" y="296" width="34" height="80" fill="#cdbf9f"/>
    </g>
    <g font-family="Fraunces,serif" font-weight="600" fill="#fff">
      <text x="172" y="290" transform="rotate(90 172 290)" font-size="18">Writing</text>
      <text x="217" y="304" transform="rotate(90 217 304)" font-size="17">Knitting</text>
      <text x="264" y="284" transform="rotate(90 264 284)" font-size="19">Reading</text>
      <text x="312" y="300" transform="rotate(90 312 300)" font-size="14">Things I saw</text>
    </g>

    <!-- a couple of small line details: ball of yarn -->
    <g fill="none" stroke="#3a2f22" stroke-width="2">
      <circle cx="470" cy="352" r="22" fill="#e0c08f"/>
      <path d="M452 346 q18 -10 36 2 M450 356 q20 -8 40 4"/>
      <line x1="486" y1="332" x2="506" y2="312"/>
      <line x1="492" y1="336" x2="512" y2="316"/>
    </g>

    <!-- second shelf hint -->
    <g stroke="#3a2f22" stroke-width="2" stroke-linejoin="round">
      <rect x="96" y="408" width="40" height="100" fill="#c0922f"/>
      <rect x="140" y="396" width="18" height="112" fill="#cdbf9f"/>
      <rect x="200" y="404" width="44" height="104" fill="#5f72a6"/>
      <rect x="300" y="400" width="20" height="108" fill="#c25b73"/>
      <rect x="360" y="408" width="40" height="100" fill="#5f9072"/>
    </g>
  </svg>
  </div>
</body>
</html>
